<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movister - Ваш личный каталог фильмов</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Rubik:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #121824;
            --bg-tertiary: #1b2336;
            --accent-primary: #8b5cf6;
            --accent-secondary: #6366f1;
            --accent-gradient: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --text-dark: #6b7280;
            --border-color: rgba(255, 255, 255, 0.08);
            --card-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.7);
            --glow-shadow: 0 0 20px rgba(139, 92, 246, 0.35);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.2) var(--bg-secondary);
        }

        /* Scrollbar styles */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.4);
        }

        body {
            font-family: 'Outfit', 'Rubik', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            overflow-x: hidden;
        }

        /* Sidebar Styling */
        aside {
            width: 260px;
            background-color: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 2rem 1.5rem;
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            z-index: 100;
            transition: all 0.3s ease;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 1.6rem;
            font-weight: 800;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 3rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .logo i {
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.8rem;
        }

        nav {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            flex-grow: 1;
        }

        .nav-btn {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.85rem 1.25rem;
            border-radius: 12px;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            font-size: 1rem;
            border: none;
            background: transparent;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
        }

        .nav-btn:hover {
            color: var(--text-main);
            background-color: rgba(255, 255, 255, 0.03);
        }

        .nav-btn.active {
            color: #fff;
            background: var(--accent-gradient);
            box-shadow: var(--glow-shadow);
        }

        .nav-btn i {
            font-size: 1.2rem;
            width: 20px;
        }

        .sidebar-footer {
            margin-top: auto;
            font-size: 0.75rem;
            color: var(--text-dark);
            text-align: center;
            border-top: 1px solid var(--border-color);
            padding-top: 1.5rem;
        }

        /* Main Container */
        main {
            margin-left: 260px;
            flex-grow: 1;
            padding: 2.5rem;
            min-height: 100vh;
            max-width: 1600px;
            width: calc(100% - 260px);
        }

        .section-header {
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .section-title {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            position: relative;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 0;
            width: 40px;
            height: 3px;
            background: var(--accent-gradient);
            border-radius: 2px;
        }

        /* Search Bar styling */
        .search-container {
            position: relative;
            max-width: 500px;
            width: 100%;
        }

        .search-input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-input {
            width: 100%;
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            padding: 0.95rem 3rem 0.95rem 1.25rem;
            color: var(--text-main);
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 15px rgba(139, 92, 246, 0.2);
            background-color: var(--bg-tertiary);
        }

        .search-btn {
            position: absolute;
            right: 12px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.1rem;
            padding: 6px;
            transition: color 0.2s ease;
        }

        .search-btn:hover {
            color: var(--accent-primary);
        }

        /* Movie Grid */
        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 2rem;
        }

        .movie-card {
            background-color: var(--bg-secondary);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--card-shadow);
            position: relative;
        }

        .movie-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: rgba(139, 92, 246, 0.4);
            box-shadow: 0 20px 30px -10px rgba(0, 0, 0, 0.8), 0 0 20px rgba(139, 92, 246, 0.15);
        }

        .poster-wrapper {
            position: relative;
            padding-top: 150%; /* 2:3 aspect ratio */
            background-color: #0b0e14;
            overflow: hidden;
        }

        .movie-poster {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .movie-card:hover .movie-poster {
            transform: scale(1.05);
        }

        .movie-rating {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(18, 24, 36, 0.85);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 700;
            color: #ffc107;
            display: flex;
            align-items: center;
            gap: 4px;
            z-index: 10;
        }

        .movie-card-info {
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            flex-grow: 1;
        }

        .movie-card-title {
            font-size: 1rem;
            font-weight: 600;
            line-height: 1.4;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            min-height: 2.8rem;
        }

        .movie-card-meta {
            font-size: 0.85rem;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Movie Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(5, 7, 12, 0.85);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            padding: 1.5rem;
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .modal-card {
            background-color: var(--bg-secondary);
            border-radius: 24px;
            width: 100%;
            max-width: 1100px;
            max-height: 90vh;
            border: 1px solid var(--border-color);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
            transform: scale(0.95);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.8);
        }

        .modal-overlay.active .modal-card {
            transform: scale(1);
        }

        .modal-close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(18, 24, 36, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            transition: all 0.2s ease;
        }

        .modal-close-btn:hover {
            background-color: var(--accent-primary);
            border-color: var(--accent-primary);
            color: white;
            transform: rotate(90deg);
        }

        .modal-banner {
            height: 250px;
            position: relative;
            background-size: cover;
            background-position: center;
        }

        .modal-banner::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(to bottom, rgba(18, 24, 36, 0.2) 0%, var(--bg-secondary) 100%);
        }

        .modal-content-wrapper {
            display: flex;
            padding: 0 2.5rem 2.5rem 2.5rem;
            margin-top: -100px;
            gap: 2.5rem;
            overflow-y: auto;
            flex-grow: 1;
        }

        .modal-left {
            width: 250px;
            flex-shrink: 0;
            position: relative;
            z-index: 2;
        }

        .modal-poster {
            width: 100%;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
            display: block;
        }

        .modal-right {
            flex-grow: 1;
            z-index: 2;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .modal-title {
            font-size: 2.2rem;
            font-weight: 800;
            line-height: 1.2;
            letter-spacing: -0.5px;
        }

        .modal-genres {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.25rem;
        }

        .genre-badge {
            background-color: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .modal-info-row {
            display: flex;
            gap: 2rem;
            align-items: center;
            font-size: 0.95rem;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 1rem;
        }

        .modal-info-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .modal-info-item i {
            color: var(--accent-primary);
        }

        .modal-overview {
            line-height: 1.6;
            color: var(--text-muted);
            font-size: 1rem;
        }

        /* Torrents Container in Modal */
        .torrents-container {
            border-top: 1px solid var(--border-color);
            padding-top: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .torrents-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .torrents-title {
            font-size: 1.25rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .torrents-search-wrapper {
            display: flex;
            gap: 8px;
            width: 100%;
            max-width: 450px;
        }

        .torrents-search-input {
            flex-grow: 1;
            background-color: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 8px 12px;
            color: var(--text-main);
            font-family: inherit;
            font-size: 0.9rem;
        }

        .torrents-search-input:focus {
            outline: none;
            border-color: var(--accent-primary);
        }

        .torrents-search-btn {
            background: var(--accent-gradient);
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: opacity 0.2s ease;
        }

        .torrents-search-btn:hover {
            opacity: 0.9;
        }

        .torrents-list {
            max-height: 350px;
            overflow-y: auto;
            border-radius: 12px;
            background-color: rgba(5, 7, 12, 0.4);
            border: 1px solid var(--border-color);
        }

        .torrent-item {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 100px 90px;
            align-items: center;
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.9rem;
            gap: 0.5rem;
            transition: background-color 0.2s ease;
        }

        .torrent-item:last-child {
            border-bottom: none;
        }

        .torrent-item:hover {
            background-color: rgba(255, 255, 255, 0.02);
        }

        .torrent-title {
            font-weight: 500;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            padding-right: 10px;
        }

        .torrent-indexer {
            color: var(--text-muted);
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .torrent-size {
            color: var(--text-muted);
            font-weight: 500;
        }

        .torrent-stats {
            display: flex;
            gap: 12px;
        }

        .stat-seeds {
            color: #10b981;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .stat-peers {
            color: #3b82f6;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .torrent-actions {
            text-align: right;
        }

        .download-btn {
            background-color: var(--accent-secondary);
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s ease;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .download-btn:hover {
            background-color: var(--accent-primary);
            box-shadow: 0 0 10px rgba(139, 92, 246, 0.4);
        }

        /* Torrent Loading & Empty States */
        .torrents-loading, .torrents-empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem 1rem;
            gap: 1rem;
            color: var(--text-muted);
            text-align: center;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(139, 92, 246, 0.2);
            border-radius: 50%;
            border-top-color: var(--accent-primary);
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Downloads View */
        .downloads-container {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .download-card {
            background-color: var(--bg-secondary);
            border-radius: 16px;
            padding: 1.5rem;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 1rem;
            box-shadow: var(--card-shadow);
        }

        .download-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1.5rem;
        }

        .download-name {
            font-size: 1.1rem;
            font-weight: 600;
            line-height: 1.4;
        }

        .download-status-badge {
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        /* Different status colors */
        .status-downloading {
            background-color: rgba(59, 130, 246, 0.15);
            color: #3b82f6;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        .status-seeding, .status-completed {
            background-color: rgba(16, 185, 129, 0.15);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .status-paused, .status-pausedup {
            background-color: rgba(107, 114, 128, 0.15);
            color: #9ca3af;
            border: 1px solid rgba(107, 114, 128, 0.3);
        }

        .status-checking, .status-queued {
            background-color: rgba(245, 158, 11, 0.15);
            color: #f59e0b;
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        .status-stalled {
            background-color: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .download-progress-container {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .progress-bar-bg {
            flex-grow: 1;
            height: 10px;
            background-color: var(--bg-tertiary);
            border-radius: 5px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: var(--accent-gradient);
            border-radius: 5px;
            width: 0%;
            transition: width 0.4s ease;
        }

        .progress-text {
            font-size: 0.9rem;
            font-weight: 700;
            min-width: 45px;
            text-align: right;
        }

        .download-details {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            font-size: 0.85rem;
            color: var(--text-muted);
            border-top: 1px solid var(--border-color);
            padding-top: 0.75rem;
        }

        .download-speeds {
            display: flex;
            gap: 1.5rem;
        }

        .speed-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .speed-item.dl i {
            color: #3b82f6;
        }

        .speed-item.ul i {
            color: #10b981;
        }

        .download-meta-info {
            display: flex;
            gap: 1.5rem;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .delete-download-btn {
            background-color: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .delete-download-btn:hover {
            background-color: #ef4444;
            color: white;
            border-color: #ef4444;
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.3);
        }

        /* Toast Notifications */
        .toast-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            pointer-events: none;
        }

        .toast {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-left: 4px solid var(--accent-primary);
            color: var(--text-main);
            padding: 1rem 1.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 10px;
            min-width: 300px;
            max-width: 450px;
            pointer-events: auto;
            transform: translateX(120%);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.success {
            border-left-color: #10b981;
        }

        .toast.success i {
            color: #10b981;
        }

        .toast.error {
            border-left-color: #ef4444;
        }

        .toast.error i {
            color: #ef4444;
        }

        /* Section control switches */
        .app-section {
            display: none;
        }

        .app-section.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .page-loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 50vh;
            gap: 1rem;
            color: var(--text-muted);
        }

        /* Responsive UI adjustments */
        @media (max-width: 768px) {
            aside {
                width: 70px;
                padding: 1.5rem 0.5rem;
            }
            .logo span, .nav-btn span, .sidebar-footer {
                display: none;
            }
            .logo {
                justify-content: center;
                margin-bottom: 2rem;
            }
            .nav-btn {
                justify-content: center;
                padding: 0.85rem;
            }
            main {
                margin-left: 70px;
                width: calc(100% - 70px);
                padding: 1.5rem;
            }
            .modal-content-wrapper {
                flex-direction: column;
                margin-top: -50px;
                padding: 0 1.5rem 1.5rem 1.5rem;
            }
            .modal-left {
                width: 150px;
                margin: 0 auto;
            }
            .modal-info-row {
                flex-wrap: wrap;
                gap: 1rem;
                justify-content: space-between;
            }
            .modal-info-row .watchlist-btn {
                margin-left: 0 !important;
                width: 100%;
                justify-content: center;
            }
            #yohoho-player {
                min-height: 280px !important;
            }
            #yohoho-iframe-direct {
                height: 280px !important;
            }
            .episode-item {
                flex-direction: column;
                align-items: flex-start !important;
                gap: 0.75rem;
            }
            .episode-item > div:last-child {
                width: 100%;
                display: flex;
                gap: 6px;
            }
            .torrent-item {
                grid-template-columns: 1fr 1fr;
                gap: 0.75rem;
            }
            .torrent-actions {
                grid-column: span 2;
            }
        }

        /* Category Selector Pills */
        .category-pill {
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .category-pill:hover {
            color: var(--text-main);
            border-color: rgba(255, 255, 255, 0.2);
        }
        .category-pill.active {
            background: var(--accent-gradient);
            color: white;
            border-color: transparent;
            box-shadow: var(--glow-shadow);
        }

        /* Watchlist Heart Button */
        .watchlist-btn {
            background-color: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
            margin-left: auto;
        }
        .watchlist-btn:hover {
            border-color: #ef4444;
            color: #ef4444;
            background-color: rgba(239, 68, 68, 0.05);
        }
        .watchlist-btn.active {
            background-color: #ef4444;
            border-color: #ef4444;
            color: white;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.3);
        }

        /* New Episode Badge */
        .new-episode-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background-color: #10b981;
            color: white;
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.6);
            z-index: 10;
            animation: pulse-green 2s infinite;
        }
        @keyframes pulse-green {
            0% { transform: scale(1); box-shadow: 0 0 10px rgba(16, 185, 129, 0.6); }
            50% { transform: scale(1.03); box-shadow: 0 0 20px rgba(16, 185, 129, 0.9); }
            100% { transform: scale(1); box-shadow: 0 0 10px rgba(16, 185, 129, 0.6); }
        }
    </style>
</head>
<body>

    <!-- Sidebar Navigation -->
    <aside>
        <div class="logo">
            <i class="fa-solid fa-clapperboard"></i>
            <span>Movister</span>
        </div>
        <nav>
            <button class="nav-btn active" id="nav-movies" onclick="switchMediaTab('movie', this)">
                <i class="fa-solid fa-film"></i>
                <span>Фильмы</span>
            </button>
            <button class="nav-btn" id="nav-tv" onclick="switchMediaTab('tv', this)">
                <i class="fa-solid fa-tv"></i>
                <span>Сериалы</span>
            </button>
            <button class="nav-btn" id="nav-watchlist" onclick="switchMediaTab('watchlist', this)">
                <i class="fa-solid fa-heart"></i>
                <span>Мой список</span>
            </button>
            <button class="nav-btn" id="nav-history" onclick="switchMediaTab('history', this)">
                <i class="fa-solid fa-clock-rotate-left"></i>
                <span>История</span>
            </button>
        </nav>
        
        <!-- Public Internet URL Indicator -->
        <div id="public-url-container" style="margin-top: auto; margin-bottom: 2rem; font-size: 0.8rem; background-color: var(--bg-tertiary); padding: 12px; border-radius: 10px; border: 1px solid var(--border-color); display: none;">
            <div style="color: var(--text-muted); margin-bottom: 4px; font-weight: 600;"><i class="fa-solid fa-globe"></i> Доступ из интернета:</div>
            <a id="public-url-link" href="#" target="_blank" style="color: var(--accent-primary); word-break: break-all; text-decoration: none; font-weight: 700;">Загрузка...</a>
        </div>

        <div class="sidebar-footer">
            <span>Movister v1.1.0</span><br>
            <span>Сделано для себя</span>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main>
        
        <!-- CATALOG SECTION -->
        <section id="catalog-section" class="app-section active">
            <div class="section-header">
                <h1 class="section-title" id="catalog-title">Фильмы</h1>
                <div class="search-container">
                    <form onsubmit="handleSearch(event)">
                        <div class="search-input-wrapper">
                            <input type="text" class="search-input" id="search-query" placeholder="Поиск фильмов...">
                            <button type="submit" class="search-btn">
                                <i class="fa-solid fa-magnifying-glass"></i>
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Category Selector (Dynamic depending on Movies / TV) -->
            <div class="category-selectors" id="category-selectors" style="display: flex; gap: 0.75rem; margin-bottom: 1.5rem; flex-wrap: wrap;">
                <!-- Filled dynamically by JS -->
            </div>

            <!-- Loader -->
            <div id="catalog-loader" class="page-loader" style="display: none;">
                <div class="spinner"></div>
                <p>Загрузка фильмов...</p>
            </div>

            <!-- Grid -->
            <div class="movies-grid" id="movies-grid">
                <!-- Movie cards populated dynamically -->
            </div>
        </section>

    </main>

    <!-- MOVIE DETAILS MODAL -->
    <div class="modal-overlay" id="movie-modal" onclick="closeModal(event)">
        <div class="modal-card" onclick="event.stopPropagation()">
            <button class="modal-close-btn" onclick="closeModal(null)">
                <i class="fa-solid fa-xmark"></i>
            </button>
            <div class="modal-banner" id="modal-banner"></div>
            <div class="modal-content-wrapper">
                <div class="modal-left">
                    <img src="" alt="" class="modal-poster" id="modal-poster">
                </div>
                <div class="modal-right">
                    <div>
                        <h2 class="modal-title" id="modal-title">Название фильма</h2>
                        <div class="modal-genres" id="modal-genres">
                            <!-- Genres badges -->
                        </div>
                    </div>
                    
                    <div class="modal-info-row">
                        <div class="modal-info-item">
                            <i class="fa-solid fa-calendar"></i>
                            <span id="modal-year">2026</span>
                        </div>
                        <div class="modal-info-item">
                            <i class="fa-solid fa-clock"></i>
                            <span id="modal-runtime">120 мин</span>
                        </div>
                        <div class="modal-info-item">
                            <i class="fa-solid fa-star" style="color: #ffc107;"></i>
                            <span id="modal-rating">8.5</span>
                        </div>
                        <div class="modal-info-item">
                            <i class="fa-solid fa-video"></i>
                            <span id="modal-quality">1080p</span>
                        </div>
                        <button class="watchlist-btn" id="modal-watch-online-btn" onclick="toggleOnlinePlayer()" style="margin-left: auto; background-color: var(--accent-primary); border-color: var(--accent-primary); color: white;">
                            <i class="fa-solid fa-play"></i> Смотреть онлайн
                        </button>
                        <button class="watchlist-btn" id="modal-watchlist-btn" onclick="toggleWatchlist()" style="margin-left: 0;">
                            <i class="fa-regular fa-heart"></i> В список
                        </button>
                    </div>

                    <div class="modal-overview" id="modal-overview">
                        Описание фильма отсутствует.
                    </div>

                    <!-- Online Player Container -->
                    <div id="online-player-container" style="display: none; border-top: 1px solid var(--border-color); padding-top: 1.5rem; margin-top: 0.5rem;">
                        <h3 class="torrents-title" style="margin-bottom: 1rem;"><i class="fa-solid fa-circle-play"></i> Онлайн-просмотр</h3>
                        <div id="yohoho-player" style="width: 100%; min-height: 450px; background-color: #0b0e14; border-radius: 16px; overflow: hidden; border: 1px solid var(--border-color);">
                            <!-- Player iframe will be loaded here -->
                        </div>
                    </div>

                    <!-- TV Show Seasons and Episodes list -->
                    <div id="tv-seasons-container" style="display: none; border-top: 1px solid var(--border-color); padding-top: 1.5rem; margin-bottom: 1.5rem;">
                        <h3 class="torrents-title" style="margin-bottom:1rem;"><i class="fa-solid fa-list-ol"></i> Сезоны и серии</h3>
                        <div id="seasons-list" style="display: flex; flex-direction: column; gap: 0.75rem;">
                            <!-- Seasons populated here -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- TOASTS CONTAINER -->
    <div class="toast-container" id="toast-container"></div>

    <script>
        // Global variables
        let currentMovie = null;
        let downloadsInterval = null;
        
        let currentPage = 1;
        let totalPages = 1;
        let currentCategory = 'trending';
        let currentType = 'movie'; // 'movie', 'tv', 'watchlist'
        let currentSearchQuery = '';
        let loadingMore = false;
        let watchlistList = [];

        const movieCategories = [
            { id: 'trending', name: 'Тренды недели' },
            { id: 'popular', name: 'Популярные' },
            { id: 'now_playing', name: 'В прокате (новинки)' },
            { id: 'top_rated', name: 'Топ рейтинга' },
            { id: 'upcoming', name: 'Скоро выйдут' }
        ];

        const tvCategories = [
            { id: 'trending', name: 'Тренды недели' },
            { id: 'popular', name: 'Популярные' },
            { id: 'on_the_air', name: 'В эфире (новые серии)' },
            { id: 'top_rated', name: 'Топ рейтинга' },
            { id: 'airing_today', name: 'Сегодня в эфире' }
        ];

        // Document Ready
        document.addEventListener('DOMContentLoaded', async () => {
            await fetchWatchlistIds();
            
            // Start catalog by default
            currentType = 'movie';
            currentCategory = 'trending';
            renderCategorySelectors();
            fetchCatalog();
            
            // Fetch public URL
            fetchPublicUrl();
            
            // Set up infinite scroll scroll event listener
            window.addEventListener('scroll', () => {
                if (currentType === 'watchlist' || currentType === 'history') {
                    return;
                }
                const { scrollTop, scrollHeight, clientHeight } = document.documentElement;
                if (scrollTop + clientHeight >= scrollHeight - 300) {
                    if (!loadingMore && currentPage < totalPages) {
                        loadNextPage();
                    }
                }
            });
        });

        // Toggle sections (for switching to downloads)
        function switchSection(sectionId, btn) {
            // Hide all sections
            document.querySelectorAll('.app-section').forEach(sec => sec.classList.remove('active'));
            // Show target
            document.getElementById(sectionId).classList.add('active');
            
            // Toggle active class on buttons
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            // Handle background polling for downloads
            if (sectionId === 'downloads-section') {
                fetchDownloads();
                if (!downloadsInterval) {
                    downloadsInterval = setInterval(fetchDownloads, 3000);
                }
            } else {
                if (downloadsInterval) {
                    clearInterval(downloadsInterval);
                    downloadsInterval = null;
                }
            }
        }

        // Toggle between media tabs (movies, tv, watchlist, history)
        async function switchMediaTab(mediaType, btn) {
            if (downloadsInterval) {
                clearInterval(downloadsInterval);
                downloadsInterval = null;
            }
            
            document.getElementById('downloads-section').classList.remove('active');
            document.getElementById('catalog-section').classList.add('active');
            
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            currentType = mediaType;
            currentSearchQuery = '';
            document.getElementById('search-query').value = '';
            
            const searchInput = document.getElementById('search-query');
            if (mediaType === 'movie') {
                searchInput.placeholder = "Поиск фильмов...";
                searchInput.disabled = false;
            } else if (mediaType === 'tv') {
                searchInput.placeholder = "Поиск сериалов...";
                searchInput.disabled = false;
            } else {
                searchInput.placeholder = "Поиск в этом разделе отключен...";
                searchInput.disabled = true;
            }
            
            if (mediaType === 'watchlist') {
                loadWatchlistSection();
            } else if (mediaType === 'history') {
                loadHistorySection();
            } else {
                currentCategory = 'trending';
                currentPage = 1;
                totalPages = 1;
                renderCategorySelectors();
                fetchCatalog();
            }
        }

        // Load Watchlist Items
        async function loadWatchlistSection() {
            const grid = document.getElementById('movies-grid');
            const loader = document.getElementById('catalog-loader');
            const title = document.getElementById('catalog-title');

            grid.style.display = 'none';
            loader.style.display = 'flex';
            title.innerText = "Мой список избранного";
            renderCategorySelectors();

            try {
                const response = await fetch('/api/watchlist');
                const data = await response.json();
                renderMovies(data, false);
            } catch (err) {
                console.error("Error loading watchlist:", err);
                showToast("Не удалось загрузить избранное", "error");
            } finally {
                loader.style.display = 'none';
                grid.style.display = 'grid';
            }
        }

        // Load History Items
        async function loadHistorySection() {
            const grid = document.getElementById('movies-grid');
            const loader = document.getElementById('catalog-loader');
            const title = document.getElementById('catalog-title');

            grid.style.display = 'none';
            loader.style.display = 'flex';
            title.innerText = "История просмотра";
            renderCategorySelectors();

            try {
                const response = await fetch('/api/history');
                const data = await response.json();
                renderMovies(data, false);
            } catch (err) {
                console.error("Error loading history:", err);
                showToast("Не удалось загрузить историю просмотра", "error");
            } finally {
                loader.style.display = 'none';
                grid.style.display = 'grid';
            }
        }

        // Render dynamic category selector pills
        function renderCategorySelectors() {
            const container = document.getElementById('category-selectors');
            container.innerHTML = '';
            
            if (currentType === 'watchlist' || currentType === 'history') {
                container.style.display = 'none';
                return;
            }
            container.style.display = 'flex';
            
            const categories = currentType === 'movie' ? movieCategories : tvCategories;
            
            categories.forEach(cat => {
                const pill = document.createElement('button');
                pill.className = `category-pill ${currentCategory === cat.id ? 'active' : ''}`;
                pill.innerText = cat.name;
                pill.onclick = () => selectCategory(cat.id);
                container.appendChild(pill);
            });
        }

        function selectCategory(categoryId) {
            currentCategory = categoryId;
            currentSearchQuery = '';
            document.getElementById('search-query').value = '';
            
            renderCategorySelectors();
            
            currentPage = 1;
            totalPages = 1;
            fetchCatalog();
        }

        // Fetch Watchlist Cache
        async function fetchWatchlistIds() {
            try {
                const response = await fetch('/api/watchlist');
                watchlistList = await response.json();
            } catch (err) {
                console.error("Error loading watchlist cache:", err);
            }
        }

        // Fetch Catalog Items
        async function fetchCatalog() {
            const grid = document.getElementById('movies-grid');
            const loader = document.getElementById('catalog-loader');
            const title = document.getElementById('catalog-title');

            grid.style.display = 'none';
            loader.style.display = 'flex';
            
            const catName = currentType === 'movie' 
                ? movieCategories.find(c => c.id === currentCategory).name 
                : tvCategories.find(c => c.id === currentCategory).name;
                
            title.innerText = currentType === 'movie' ? `Фильмы: ${catName}` : `Сериалы: ${catName}`;

            try {
                const response = await fetch(`/api/catalog?type=${currentType}&category=${currentCategory}&page=1`);
                const data = await response.json();
                totalPages = data.total_pages || 1;
                renderMovies(data.results, false);
            } catch (err) {
                console.error("Error loading catalog:", err);
                showToast("Не удалось загрузить каталог", "error");
            } finally {
                loader.style.display = 'none';
                grid.style.display = 'grid';
            }
        }

        // Load next page on scroll
        async function loadNextPage() {
            loadingMore = true;
            currentPage++;
            
            const grid = document.getElementById('movies-grid');
            let bottomLoader = document.getElementById('catalog-bottom-loader');
            if (!bottomLoader) {
                bottomLoader = document.createElement('div');
                bottomLoader.id = 'catalog-bottom-loader';
                bottomLoader.className = 'page-loader';
                bottomLoader.style.minHeight = '10vh';
                bottomLoader.innerHTML = '<div class="spinner" style="width:30px;height:30px;"></div>';
                grid.after(bottomLoader);
            }
            bottomLoader.style.display = 'flex';

            try {
                let url = '';
                if (currentSearchQuery) {
                    url = `/api/search?query=${encodeURIComponent(currentSearchQuery)}&type=${currentType}&page=${currentPage}`;
                } else {
                    url = `/api/catalog?type=${currentType}&category=${currentCategory}&page=${currentPage}`;
                }
                const response = await fetch(url);
                const data = await response.json();
                totalPages = data.total_pages || 1;
                renderMovies(data.results, true);
            } catch (err) {
                console.error("Error loading next page:", err);
                showToast("Не удалось загрузить больше элементов", "error");
            } finally {
                bottomLoader.style.display = 'none';
                loadingMore = false;
            }
        }

        // Handle Search Form Submission
        async function handleSearch(e) {
            e.preventDefault();
            const query = document.getElementById('search-query').value.trim();
            if (!query) {
                currentPage = 1;
                totalPages = 1;
                fetchCatalog();
                return;
            }

            currentSearchQuery = query;
            const grid = document.getElementById('movies-grid');
            const loader = document.getElementById('catalog-loader');
            const title = document.getElementById('catalog-title');

            grid.style.display = 'none';
            loader.style.display = 'flex';
            title.innerText = `Поиск ${currentType === 'movie' ? 'фильмов' : 'сериалов'}: "${query}"`;

            try {
                currentPage = 1;
                totalPages = 1;
                const response = await fetch(`/api/search?query=${encodeURIComponent(query)}&type=${currentType}&page=1`);
                const data = await response.json();
                totalPages = data.total_pages || 1;
                renderMovies(data.results, false);
            } catch (err) {
                console.error("Error searching movies:", err);
                showToast("Ошибка при выполнении поиска", "error");
            } finally {
                loader.style.display = 'none';
                grid.style.display = 'grid';
            }
        }

        // Render Movie/TV Cards
        function renderMovies(movies, append = false) {
            const grid = document.getElementById('movies-grid');
            if (!append) {
                grid.innerHTML = '';
            }

            if ((!movies || movies.length === 0) && !append) {
                grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 4rem 1rem;">Ничего не найдено.</div>`;
                return;
            }

            movies.forEach(movie => {
                const titleStr = movie.title || movie.name || 'Без названия';
                const posterUrl = movie.poster_path ? `/img/w500${movie.poster_path}` : 'https://via.placeholder.com/500x750?text=Нет+постера';
                const rating = movie.vote_average ? movie.vote_average.toFixed(1) : '—';
                
                const dateStr = movie.release_date || movie.first_air_date;
                const year = dateStr ? dateStr.split('-')[0] : '—';
                
                let typeStr = 'Кино';
                let mType = 'movie';
                if (movie.media_type === 'tv' || movie.type === 'tv' || currentType === 'tv') {
                    typeStr = 'Сериал';
                    mType = 'tv';
                }

                let newEpBadge = '';
                if (movie.new_episode) {
                    newEpBadge = `<div class="new-episode-badge">Новая серия! ${movie.new_episode_info || ''}</div>`;
                }

                let historyBadge = '';
                if (currentType === 'history' && movie.season && movie.episode) {
                    historyBadge = `<div class="new-episode-badge" style="background-color: var(--accent-secondary); box-shadow: 0 0 10px rgba(99, 102, 241, 0.6); animation: none;">Смотрел: С${movie.season}Э${movie.episode}</div>`;
                }

                const card = document.createElement('div');
                card.className = 'movie-card';
                card.onclick = () => openMovie(movie.id, mType);
                card.innerHTML = `
                    <div class="poster-wrapper">
                        ${newEpBadge}
                        ${historyBadge}
                        <img src="${posterUrl}" alt="${titleStr}" class="movie-poster" loading="lazy">
                        <div class="movie-rating"><i class="fa-solid fa-star"></i> ${rating}</div>
                    </div>
                    <div class="movie-card-info">
                        <h3 class="movie-card-title">${titleStr}</h3>
                        <div class="movie-card-meta">
                            <span>${year}</span>
                            <span style="font-size: 0.75rem; background-color: var(--border-color); padding: 2px 6px; border-radius: 4px; text-transform: uppercase;">${typeStr}</span>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Open Movie / TV details modal
        async function openMovie(movieId, mediaType) {
            const mType = mediaType || currentType;
            const modal = document.getElementById('movie-modal');
            
            // Clean modal states
            document.getElementById('modal-title').innerText = "Загрузка...";
            document.getElementById('modal-poster').src = "";
            document.getElementById('modal-banner').style.backgroundImage = 'none';
            document.getElementById('modal-year').innerText = "—";
            document.getElementById('modal-runtime').innerText = "—";
            document.getElementById('modal-rating').innerText = "—";
            document.getElementById('modal-overview').innerText = "Загрузка информации...";
            document.getElementById('modal-genres').innerHTML = '';
            
            document.getElementById('tv-seasons-container').style.display = 'none';
            document.getElementById('seasons-list').innerHTML = '';
            
            // Clean online player state
            const playerContainer = document.getElementById('online-player-container');
            if (playerContainer) {
                playerContainer.style.display = 'none';
            }
            const playerWrapper = document.getElementById('yohoho-player');
            if (playerWrapper) {
                playerWrapper.innerHTML = '';
            }
            const watchBtn = document.getElementById('modal-watch-online-btn');
            if (watchBtn) {
                watchBtn.innerHTML = `<i class="fa-solid fa-play"></i> Смотреть онлайн`;
                watchBtn.style.backgroundColor = 'var(--accent-primary)';
                watchBtn.style.borderColor = 'var(--accent-primary)';
                watchBtn.style.color = 'white';
            }

            modal.classList.add('active');

            try {
                const detailUrl = mType === 'tv' ? `/api/tv/${movieId}` : `/api/movie/${movieId}`;
                const response = await fetch(detailUrl);
                const movie = await response.json();
                
                currentMovie = movie;
                currentMovie.type = mType;

                const titleStr = movie.title || movie.name;
                document.getElementById('modal-title').innerText = titleStr;
                document.getElementById('modal-poster').src = movie.poster_path ? `/img/w500${movie.poster_path}` : 'https://via.placeholder.com/500x750?text=Нет+постера';
                
                if (movie.backdrop_path) {
                    document.getElementById('modal-banner').style.backgroundImage = `url('/img/original${movie.backdrop_path}')`;
                }

                const dateStr = movie.release_date || movie.first_air_date;
                document.getElementById('modal-year').innerText = dateStr ? dateStr.split('-')[0] : '—';
                
                if (mType === 'tv') {
                    document.getElementById('modal-runtime').innerText = movie.number_of_seasons ? `${movie.number_of_seasons} сез.` : '—';
                } else {
                    document.getElementById('modal-runtime').innerText = movie.runtime ? `${movie.runtime} мин` : '—';
                }
                
                document.getElementById('modal-rating').innerText = movie.vote_average ? movie.vote_average.toFixed(1) : '—';
                document.getElementById('modal-overview').innerText = movie.overview || "Описание на русском языке отсутствует.";

                // Heuristic Quality Indicator
                const releaseYear = dateStr ? parseInt(dateStr.split('-')[0]) : 0;
                const voteAvg = movie.vote_average || 0;
                const qualityEl = document.getElementById('modal-quality');
                if (releaseYear >= 2023 && voteAvg >= 7.0) {
                    qualityEl.innerText = "4K / 1080p";
                } else if (releaseYear >= 2005) {
                    qualityEl.innerText = "1080p";
                } else {
                    qualityEl.innerText = "720p";
                }

                const genresContainer = document.getElementById('modal-genres');
                genresContainer.innerHTML = '';
                if (movie.genres) {
                    movie.genres.forEach(g => {
                        const badge = document.createElement('span');
                        badge.className = 'genre-badge';
                        badge.innerText = g.name;
                        genresContainer.appendChild(badge);
                    });
                }

                updateWatchlistButtonState(movie.id);

                if (mType === 'tv') {
                    document.getElementById('tv-seasons-container').style.display = 'block';
                    renderSeasons(movie.seasons, movie.id);
                } else {
                    const searchYear = movie.release_date ? movie.release_date.split('-')[0] : '';
                    const searchQuery = `${titleStr} ${searchYear}`.trim();
                    
                    await fetchTorrents(searchQuery, 'movie');
                }

            } catch (err) {
                console.error("Error fetching details:", err);
                showToast("Не удалось загрузить данные о фильме", "error");
                closeModal(null);
            }
        }

        // Watchlist state styling
        function updateWatchlistButtonState(movieId) {
            const btn = document.getElementById('modal-watchlist-btn');
            const isFav = watchlistList.some(item => item.id === movieId && item.type === currentMovie.type);
            if (isFav) {
                btn.classList.add('active');
                btn.innerHTML = `<i class="fa-solid fa-heart"></i> В списке`;
            } else {
                btn.classList.remove('active');
                btn.innerHTML = `<i class="fa-regular fa-heart"></i> В список`;
            }
        }

        // Toggle Favorite status
        async function toggleWatchlist() {
            if (!currentMovie) return;
            const btn = document.getElementById('modal-watchlist-btn');
            const isAdding = !btn.classList.contains('active');
            
            try {
                const response = await fetch('/api/watchlist/toggle', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        id: currentMovie.id,
                        type: currentMovie.type,
                        title: currentMovie.title || currentMovie.name,
                        poster_path: currentMovie.poster_path,
                        vote_average: currentMovie.vote_average,
                        release_date: currentMovie.release_date || currentMovie.first_air_date
                    })
                });
                const res = await response.json();
                if (response.ok) {
                    showToast(res.status === 'added' ? 'Добавлено в мой список' : 'Удалено из списка', 'success');
                    await fetchWatchlistIds();
                    updateWatchlistButtonState(currentMovie.id);
                    if (currentType === 'watchlist') {
                        loadWatchlistSection();
                    }
                }
            } catch (err) {
                console.error("Error toggling watchlist:", err);
                showToast("Не удалось изменить избранное", "error");
            }
        }

        // Render TV Seasons Expandable
        function renderSeasons(seasons, tvId) {
            const list = document.getElementById('seasons-list');
            list.innerHTML = '';
            
            if (!seasons || seasons.length === 0) {
                list.innerHTML = '<div style="color:var(--text-muted);font-size:0.9rem;">Нет информации о сезонах.</div>';
                return;
            }
            
            const filteredSeasons = seasons.filter(s => s.season_number > 0 || seasons.length === 1);
            
            filteredSeasons.forEach(season => {
                const item = document.createElement('div');
                item.className = 'season-item';
                item.style.border = '1px solid var(--border-color)';
                item.style.borderRadius = '12px';
                item.style.backgroundColor = 'var(--bg-tertiary)';
                item.style.overflow = 'hidden';
                item.style.marginBottom = '0.5rem';
                
                const sNumStr = String(season.season_number).padStart(2, '0');
                const searchQuery = `${currentMovie.name || currentMovie.title} S${sNumStr}`;
                
                item.innerHTML = `
                    <div class="season-header" onclick="toggleSeason(${season.season_number}, ${tvId})" style="padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; cursor: pointer;">
                        <div style="font-weight: 700; font-size: 1.05rem;">${season.name} (${season.episode_count} сер.)</div>
                        <div style="display: flex; gap: 8px; align-items: center; pointer-events: auto;">
                            <button class="download-btn" onclick="event.stopPropagation(); searchTVTorrents('${searchQuery.replace(/'/g, "\\'")}')" style="padding: 4px 10px; font-size: 0.8rem; width: auto;">
                                <i class="fa-solid fa-magnifying-glass"></i> Найти сезон
                            </button>
                            <i class="fa-solid fa-chevron-down" id="season-chevron-${season.season_number}" style="transition: transform 0.2s ease; margin-left: 8px;"></i>
                        </div>
                    </div>
                    <div class="season-episodes" id="season-episodes-${season.season_number}" style="display: none; padding: 12px 16px; border-top: 1px solid var(--border-color); background-color: rgba(5,7,12,0.2);">
                        <div class="spinner" style="width:20px;height:20px;margin: 10px auto;"></div>
                    </div>
                `;
                list.appendChild(item);
            });
        }

        async function toggleSeason(seasonNum, tvId) {
            const epContainer = document.getElementById(`season-episodes-${seasonNum}`);
            const chevron = document.getElementById(`season-chevron-${seasonNum}`);
            const isHidden = epContainer.style.display === 'none';
            
            if (isHidden) {
                epContainer.style.display = 'block';
                chevron.style.transform = 'rotate(180deg)';
                
                if (epContainer.getAttribute('data-loaded') !== 'true') {
                    try {
                        const r = await fetch(`/api/tv/${tvId}/season/${seasonNum}`);
                        const data = await r.json();
                        
                        let html = '<div style="display: flex; flex-direction: column; gap: 0.75rem;">';
                        data.episodes.forEach(ep => {
                            const sNumStr = String(seasonNum).padStart(2, '0');
                            const epNumStr = String(ep.episode_number).padStart(2, '0');
                            const epQuery = `${currentMovie.name || currentMovie.title} S${sNumStr}E${epNumStr}`;
                            
                            html += `
                                <div class="episode-item" style="display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem; border-bottom: 1px solid rgba(255,255,255,0.03); padding-bottom: 8px;">
                                    <div style="flex-grow: 1; padding-right:15px;">
                                        <strong>Серия ${ep.episode_number}:</strong> ${ep.name || 'Без названия'}
                                        <div style="font-size: 0.75rem; color: var(--text-muted);">${ep.air_date ? ep.air_date.split('-').reverse().join('.') : ''}</div>
                                    </div>
                                    <div style="display: flex; gap: 6px;">
                                        <button class="download-btn" onclick="playEpisodeOnline(${seasonNum}, ${ep.episode_number}, '${(ep.name || 'Серия ' + ep.episode_number).replace(/'/g, "\\'")}')" style="padding: 4px 8px; font-size: 0.75rem; width: auto; background-color: var(--accent-primary);">
                                            <i class="fa-solid fa-play"></i> Смотреть
                                        </button>
                                        <button class="download-btn" onclick="searchTVTorrents('${epQuery.replace(/'/g, "\\'")}')" style="padding: 4px 8px; font-size: 0.75rem; width: auto; background-color: var(--bg-secondary);">
                                            <i class="fa-solid fa-magnifying-glass"></i> Найти серию
                                        </button>
                                    </div>
                                </div>
                            `;
                        });
                        html += '</div>';
                        epContainer.innerHTML = html;
                        epContainer.setAttribute('data-loaded', 'true');
                    } catch (err) {
                        console.error("Error fetching episodes:", err);
                        epContainer.innerHTML = '<div style="color:var(--text-muted);font-size:0.8rem;text-align:center;">Не удалось загрузить серии.</div>';
                    }
                }
            } else {
                epContainer.style.display = 'none';
                chevron.style.transform = 'rotate(0deg)';
            }
        }

        // Search TV series torrent trigger
        function searchTVTorrents(query) {
            document.getElementById('torrents-search-query').value = query;
            fetchTorrents(query, 'tv');
            document.querySelector('.torrents-container').scrollIntoView({ behavior: 'smooth' });
        }

        // Close Modal
        function closeModal(e) {
            if (e === null || e.target === document.getElementById('movie-modal')) {
                document.getElementById('movie-modal').classList.remove('active');
                currentMovie = null;
                // Destroy player to stop audio/video playing in background
                const playerContainer = document.getElementById('online-player-container');
                if (playerContainer) {
                    playerContainer.style.display = 'none';
                }
                const playerWrapper = document.getElementById('yohoho-player');
                if (playerWrapper) {
                    playerWrapper.innerHTML = '';
                }
                const btn = document.getElementById('modal-watch-online-btn');
                if (btn) {
                    btn.innerHTML = `<i class="fa-solid fa-play"></i> Смотреть онлайн`;
                    btn.style.backgroundColor = 'var(--accent-primary)';
                    btn.style.borderColor = 'var(--accent-primary)';
                    btn.style.color = 'white';
                }
            }
        }

        // Toggle Online Player view
        function toggleOnlinePlayer() {
            if (!currentMovie) return;
            const container = document.getElementById('online-player-container');
            const btn = document.getElementById('modal-watch-online-btn');
            const isHidden = container.style.display === 'none';
            
            if (isHidden) {
                container.style.display = 'block';
                btn.innerHTML = `<i class="fa-solid fa-stop"></i> Закрыть плеер`;
                btn.style.backgroundColor = 'rgba(239, 68, 68, 0.1)';
                btn.style.borderColor = 'rgba(239, 68, 68, 0.2)';
                btn.style.color = '#ef4444';
                
                // Get IMDb ID if available
                let imdbId = '';
                if (currentMovie.imdb_id) {
                    imdbId = currentMovie.imdb_id;
                } else if (currentMovie.external_ids && currentMovie.external_ids.imdb_id) {
                    imdbId = currentMovie.external_ids.imdb_id;
                }
                
                const titleStr = currentMovie.title || currentMovie.name;
                loadOnlinePlayer(imdbId, titleStr);
                
                // Record watch in history
                recordWatchHistory();
                
                // Scroll player into view
                container.scrollIntoView({ behavior: 'smooth' });
            } else {
                container.style.display = 'none';
                btn.innerHTML = `<i class="fa-solid fa-play"></i> Смотреть онлайн`;
                btn.style.backgroundColor = 'var(--accent-primary)';
                btn.style.borderColor = 'var(--accent-primary)';
                btn.style.color = 'white';
                
                // Destroy player
                const playerWrapper = document.getElementById('yohoho-player');
                if (playerWrapper) {
                    playerWrapper.innerHTML = '';
                }
            }
        }

        // Load player dynamically
        function loadOnlinePlayer(imdbId, title, season = null, episode = null) {
            const playerWrapper = document.getElementById('yohoho-player');
            if (!playerWrapper) return;
            
            playerWrapper.innerHTML = '';
            
            const iframe = document.createElement('iframe');
            iframe.id = 'yohoho-iframe-direct';
            
            let url = '';
            if (imdbId) {
                // Point to Collaps (api.namy.ws) directly using IMDb ID
                url = `https://api.namy.ws/embed/imdb/${imdbId}`;
                if (season !== null && episode !== null) {
                    url += `?season=${season}&episode=${episode}`;
                }
            } else {
                // Fall back to searching by title on yohoho.online mirror
                url = `https://yohoho.online/#${encodeURIComponent(title)}`;
                if (season !== null && episode !== null) {
                    url += `?season=${season}&episode=${episode}`;
                }
            }
            
            iframe.setAttribute('src', url);
            iframe.setAttribute('frameborder', '0');
            iframe.setAttribute('allowfullscreen', 'allowfullscreen');
            iframe.setAttribute('style', 'width: 100%; height: 450px; border: 0; border-radius: 16px;');
            
            playerWrapper.appendChild(iframe);
        }

        // Play specific episode online
        function playEpisodeOnline(seasonNum, episodeNum, episodeTitle) {
            if (!currentMovie) return;
            const container = document.getElementById('online-player-container');
            const btn = document.getElementById('modal-watch-online-btn');
            
            container.style.display = 'block';
            btn.innerHTML = `<i class="fa-solid fa-stop"></i> Закрыть плеер`;
            btn.style.backgroundColor = 'rgba(239, 68, 68, 0.1)';
            btn.style.borderColor = 'rgba(239, 68, 68, 0.2)';
            btn.style.color = '#ef4444';
            
            let imdbId = '';
            if (currentMovie.imdb_id) {
                imdbId = currentMovie.imdb_id;
            } else if (currentMovie.external_ids && currentMovie.external_ids.imdb_id) {
                imdbId = currentMovie.external_ids.imdb_id;
            }
            
            const titleStr = currentMovie.name || currentMovie.title;
            loadOnlinePlayer(imdbId, titleStr, seasonNum, episodeNum);
            
            // Record watch in history
            recordWatchHistory(seasonNum, episodeNum, episodeTitle);
            
            // Scroll player into view
            container.scrollIntoView({ behavior: 'smooth' });
        }

        // Send POST to /api/history
        async function recordWatchHistory(season = null, episode = null, episodeTitle = null) {
            if (!currentMovie) return;
            try {
                await fetch('/api/history', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        id: currentMovie.id,
                        type: currentMovie.type,
                        title: currentMovie.title || currentMovie.name,
                        poster_path: currentMovie.poster_path,
                        vote_average: currentMovie.vote_average,
                        release_date: currentMovie.release_date || currentMovie.first_air_date,
                        season: season,
                        episode: episode,
                        episode_title: episodeTitle
                    })
                });
                
                // If we are currently on history section, reload in background
                if (currentType === 'history') {
                    loadHistorySection();
                }
            } catch (err) {
                console.error("Error recording watch history:", err);
            }
        }

        // Fetch public URL from backend
        async function fetchPublicUrl() {
            try {
                const response = await fetch('/api/public-url');
                const data = await response.json();
                if (data.url) {
                    document.getElementById('public-url-container').style.display = 'block';
                    const link = document.getElementById('public-url-link');
                    link.href = data.url;
                    link.innerText = data.url;
                }
            } catch (e) {
                console.error("Error fetching public URL:", e);
            }
        }
    </script>
</body>
</html>
